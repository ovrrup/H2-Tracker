name: Build H2 Tracker APK

on:
  push:
    branches:
      - remote
      - master
  pull_request:
    branches:
      - remote
      - master
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:

      # ════════════════════════════════════════════════════════════════════════
      # 1. CHECKOUT
      # ════════════════════════════════════════════════════════════════════════
      - name: Checkout repository
        uses: actions/checkout@v4

      # ════════════════════════════════════════════════════════════════════════
      # 2. NODE.JS 22
      # ════════════════════════════════════════════════════════════════════════
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ════════════════════════════════════════════════════════════════════════
      # 3. JAVA 21
      # ════════════════════════════════════════════════════════════════════════
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ════════════════════════════════════════════════════════════════════════
      # 4. ANDROID SDK
      # ════════════════════════════════════════════════════════════════════════
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ════════════════════════════════════════════════════════════════════════
      # 5. INSTALL DEPENDENCIES
      # ════════════════════════════════════════════════════════════════════════
      - name: Install dependencies
        run: npm ci

      # ════════════════════════════════════════════════════════════════════════
      # 6. STRIP VITE CONFIG — remove VitePWA + Google references so the build
      #    doesn't fail on missing packages or blocked network calls
      # ════════════════════════════════════════════════════════════════════════
      - name: Clean vite.config.ts
        run: |
          node - << 'JS'
          const fs = require('fs');
          let cfg = fs.readFileSync('vite.config.ts', 'utf8');

          // Remove VitePWA import line
          cfg = cfg.replace(/^import\s+\{[^}]*VitePWA[^}]*\}.*vite-plugin-pwa.*\n/m, '');

          // Remove entire VitePWA(...) plugin call — handles multiline
          cfg = cfg.replace(/VitePWA\s*\(\s*\{[\s\S]*?\}\s*\)\s*,?\s*\n/m, '');

          // Remove Google Gemini env reference comments or lines
          cfg = cfg.replace(/.*GEMINI.*\n/g, '');
          cfg = cfg.replace(/.*gemini.*\n/gi, '');

          // Remove AI Studio HMR disable block comments
          cfg = cfg.replace(/\/\/ HMR is disabled.*\n/g, '');
          cfg = cfg.replace(/\/\/ Do not modify.*\n/g, '');
          cfg = cfg.replace(/\/\/ Disable file watching.*\n/g, '');

          fs.writeFileSync('vite.config.ts', cfg);
          console.log('vite.config.ts cleaned');
          console.log(fs.readFileSync('vite.config.ts', 'utf8'));
          JS

      # ════════════════════════════════════════════════════════════════════════
      # 7. BUILD WEB ASSETS
      # ════════════════════════════════════════════════════════════════════════
      - name: Build web assets
        run: |
          npm run build
          echo "── dist/ contents ──"
          ls -lh dist/

      # ════════════════════════════════════════════════════════════════════════
      # 8. ADD ANDROID PLATFORM (scaffold only, no sync yet)
      # ════════════════════════════════════════════════════════════════════════
      - name: Add Android platform
        run: npx cap add android
      # ════════════════════════════════════════════════════════════════════════
      # 8.5 GENERATE ANDROID ICONS FROM SVG
      #     Reads 'assets/icon.png' and creates all required Android icon sizes
      # ════════════════════════════════════════════════════════════════════════
      - name: Generate App Icons
        run: npx @capacitor/assets generate --android

      # ════════════════════════════════════════════════════════════════════════
      # 9. BUMP versionCode + versionName
      #    versionCode = github.run_number  (always increasing integer)
      #    versionName = 1.<run_number>     (human-readable, e.g. 1.42)
      #    Android uses versionCode to decide which APK is newer — a higher
      #    number means "this is the update". Never reuse or lower this value.
      # ════════════════════════════════════════════════════════════════════════
      - name: Bump versionCode and versionName
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.${VERSION_CODE}"
          echo "Setting versionCode=${VERSION_CODE}  versionName=${VERSION_NAME}"

          GRADLE_FILE="android/app/build.gradle"

          # Replace versionCode line
          sed -i "s/versionCode .*/versionCode ${VERSION_CODE}/" "$GRADLE_FILE"

          # Replace versionName line
          sed -i "s/versionName .*/versionName \"${VERSION_NAME}\"/" "$GRADLE_FILE"

          echo "── Updated build.gradle version lines ──"
          grep -E "versionCode|versionName" "$GRADLE_FILE"

          # Save for summary
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV

      # ════════════════════════════════════════════════════════════════════════
      # 10. APPLY CUSTOM FILE OVERRIDES
      #     Commit any file to android-overrides/ and it overwrites the
      #     generated counterpart — e.g. AndroidManifest.xml, icons, strings
      # ════════════════════════════════════════════════════════════════════════
      - name: Apply custom file overrides
        run: |
          if [ -d "android-overrides" ]; then
            echo "── Applying android-overrides/ ──"
            cp -rv android-overrides/. android/
          else
            echo "── No android-overrides/ found, skipping ──"
          fi

      # ════════════════════════════════════════════════════════════════════════
      # 11. SYNC CAPACITOR (dist/ is ready, overrides are in place)
      # ════════════════════════════════════════════════════════════════════════
      - name: Sync Capacitor into Android
        run: npx cap sync android

      # ════════════════════════════════════════════════════════════════════════
      # 12. STAMP BUILD METADATA
      # ════════════════════════════════════════════════════════════════════════
      - name: Stamp build metadata
        run: |
          mkdir -p android/app/src/main/assets
          {
            echo "App:     H2 Tracker"
            echo "Author:  ovrrpo"
            echo "Version: ${{ env.VERSION_NAME }} (code ${{ env.VERSION_CODE }})"
            echo "Build:   ${{ github.run_number }}"
            echo "Commit:  ${{ github.sha }}"
            echo "Date:    $(date -u)"
          } > android/app/src/main/assets/build-info.txt

      # ════════════════════════════════════════════════════════════════════════
      # 13. BUILD DEBUG APK
      # ════════════════════════════════════════════════════════════════════════
      - name: Build debug APK
        id: build_debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../gradle-debug.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ════════════════════════════════════════════════════════════════════════
      # 14. BUILD SIGNED RELEASE APK
      #     ─────────────────────────────────────────────────────────────────
      #     HOW TO ENABLE:
      #       1. Generate a keystore on your machine:
      #            keytool -genkey -v -keystore h2tracker.jks \
      #              -alias h2tracker -keyalg RSA -keysize 2048 -validity 10000
      #       2. Base64-encode it:
      #            base64 -w 0 h2tracker.jks
      #       3. Add these four GitHub Secrets to your repo
      #          (Settings → Secrets → Actions → New repository secret):
      #            KEYSTORE_BASE64   ← the base64 string from step 2
      #            KEY_ALIAS         ← e.g. h2tracker
      #            KEY_PASSWORD      ← password you chose for the key
      #            STORE_PASSWORD    ← password you chose for the keystore
      #       4. Remove the leading '#' from every line in this block.
      #     ─────────────────────────────────────────────────────────────────
      # - name: Decode keystore
      #   run: |
      #     echo "${{ secrets.KEYSTORE_BASE64 }}" \
      #       | base64 --decode > android/app/h2tracker.jks
      #
      # - name: Build signed release APK
      #   id: build_release
      #   working-directory: android
      #   run: |
      #     chmod +x gradlew
      #     ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee ../gradle-release.log \
      #       -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/h2tracker.jks \
      #       -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
      #       -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
      #       -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      #   env:
      #     ANDROID_HOME: ${{ env.ANDROID_HOME }}
      #
      # - name: Upload signed release APK
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: H2-Tracker-release-v${{ env.VERSION_NAME }}
      #     path: android/app/build/outputs/apk/release/app-release.apk
      #     if-no-files-found: error
      #     retention-days: 90

      # ════════════════════════════════════════════════════════════════════════
      # 15. UPLOAD DEBUG APK
      # ════════════════════════════════════════════════════════════════════════
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: H2-Tracker-debug-v${{ env.VERSION_NAME }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ════════════════════════════════════════════════════════════════════════
      # 16. UPLOAD GRADLE LOG ON FAILURE (helps diagnose errors)
      # ════════════════════════════════════════════════════════════════════════
      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-failure-log-${{ github.run_number }}
          path: gradle-*.log
          if-no-files-found: ignore
          retention-days: 7

      # ════════════════════════════════════════════════════════════════════════
      # 17. BUILD SUMMARY (success + failure)
      # ════════════════════════════════════════════════════════════════════════
      - name: Build summary
        if: always()
        run: |
          # ── Detect overall result ──
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            STATUS="✅ Success"
            APK_SIZE=$(stat -c%s android/app/build/outputs/apk/debug/app-debug.apk)
            APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1048576" | bc)
          else
            STATUS="❌ Failed"
            APK_SIZE_MB="—"
          fi

          # ── Write summary table ──
          {
            echo "## ${STATUS} — H2 Tracker APK Build"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| App | H2 Tracker |"
            echo "| Package | com.h2tracker.localapp |"
            echo "| Author | ovrrpo |"
            echo "| Node.js | 22 |"
            echo "| Version name | \`${{ env.VERSION_NAME }}\` |"
            echo "| Version code | \`${{ env.VERSION_CODE }}\` |"
            echo "| Build # | \`${{ github.run_number }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| APK size | ${APK_SIZE_MB} MB |"
            echo "| Status | ${STATUS} |"
          } >> $GITHUB_STEP_SUMMARY

          # ── On failure: extract and print the actual error from Gradle log ──
          if [ "$STATUS" = "❌ Failed" ] && [ -f gradle-debug.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🔍 Error Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

            # Extract the most useful error lines from the Gradle log
            grep -E \
              "^FAILURE|^> Task|error:|Error:|Exception|FAILED|What went wrong|> Could not|Caused by:" \
              gradle-debug.log \
              | head -60 \
              >> $GITHUB_STEP_SUMMARY || echo "Could not parse error from log" >> $GITHUB_STEP_SUMMARY

            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

            # Also print the last 30 lines of the log for context
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Last 30 lines of Gradle output" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -30 gradle-debug.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

          # Also catch non-Gradle failures (vite, npm, cap) from the runner log
          if [ "$STATUS" = "❌ Failed" ] && [ ! -f gradle-debug.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🔍 Build failed before Gradle" >> $GITHUB_STEP_SUMMARY
            echo "Check the step logs above — the failure occurred in an earlier step (npm build, cap add, or cap sync)." >> $GITHUB_STEP_SUMMARY
          fi
