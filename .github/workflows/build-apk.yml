name: Build H2 Tracker APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── Java (required by Gradle / Android SDK) ──────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ─── Android SDK ──────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ─── Install npm dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ─── Build the web assets (Vite) ──────────────────────────────────────
      - name: Build web assets
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      # ─── Add Android platform only if android/ folder does not exist ──────
      - name: Add Capacitor Android platform
        run: |
          if [ ! -d "android" ]; then
            echo "android/ not found – running cap add android"
            npx cap add android
          else
            echo "android/ already exists – skipping cap add"
          fi

      # ─── Sync web assets into the Android project ─────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ─── Stamp build metadata ─────────────────────────────────────────────
      - name: Set app metadata
        run: |
          mkdir -p android/app/src/main/assets
          echo "Built by ovrrpo – H2 Tracker" > android/app/src/main/assets/build-info.txt

      # ─── Build debug APK ──────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ─── Upload APK ───────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: H2-Tracker-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ─── Build summary ────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ H2 Tracker APK built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| App | H2 Tracker |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ovrrpo |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(stat -c%s android/app/build/outputs/apk/debug/app-debug.apk 2>/dev/null || echo "N/A")
          echo "| APK size (bytes) | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
