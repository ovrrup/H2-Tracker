name: Build H2 Tracker APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:

      # ════════════════════════════════════════════════════════════════════════
      # 1. CHECKOUT
      # ════════════════════════════════════════════════════════════════════════
      - name: Checkout repository
        uses: actions/checkout@v4

      # ════════════════════════════════════════════════════════════════════════
      # 2. NODE.JS 22
      # ════════════════════════════════════════════════════════════════════════
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ════════════════════════════════════════════════════════════════════════
      # 3. JAVA 17  (required by Gradle & Android SDK)
      # ════════════════════════════════════════════════════════════════════════
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ════════════════════════════════════════════════════════════════════════
      # 4. ANDROID SDK
      # ════════════════════════════════════════════════════════════════════════
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ════════════════════════════════════════════════════════════════════════
      # 5. INSTALL NPM DEPENDENCIES
      # ════════════════════════════════════════════════════════════════════════
      - name: Install dependencies
        run: npm ci

      # ════════════════════════════════════════════════════════════════════════
      # 6. BUILD WEB ASSETS (Vite)
      # ════════════════════════════════════════════════════════════════════════
      - name: Build web assets
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      # ════════════════════════════════════════════════════════════════════════
      # 7. GENERATE ANDROID FRAMEWORK  (always fresh — no android/ in repo)
      # ════════════════════════════════════════════════════════════════════════
      - name: Generate Android framework via Capacitor
        run: |
          echo "── Generating a clean Android project with Capacitor ──"
          npx cap add android
          npx cap sync android
          echo "── Android framework generated ──"

      # ════════════════════════════════════════════════════════════════════════
      # 8. OVERLAY YOUR CUSTOM FILES
      #    Any file you commit to  android-overrides/  in your repo will
      #    overwrite the generated counterpart here, so your custom
      #    AndroidManifest.xml, strings.xml, styles, icons, etc. are preserved.
      #
      #    Folder mapping (examples):
      #      android-overrides/app/src/main/AndroidManifest.xml
      #        → android/app/src/main/AndroidManifest.xml
      #      android-overrides/app/src/main/res/values/strings.xml
      #        → android/app/src/main/res/values/strings.xml
      #      android-overrides/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      #        → android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      # ════════════════════════════════════════════════════════════════════════
      - name: Apply custom file overrides
        run: |
          if [ -d "android-overrides" ]; then
            echo "── android-overrides/ found, applying your custom files ──"
            cp -rv android-overrides/. android/
            echo "── Overrides applied ──"
          else
            echo "── No android-overrides/ folder found, using generated files as-is ──"
          fi

      # ════════════════════════════════════════════════════════════════════════
      # 9. STAMP BUILD METADATA
      # ════════════════════════════════════════════════════════════════════════
      - name: Stamp build metadata
        run: |
          mkdir -p android/app/src/main/assets
          echo "App:    H2 Tracker"          > android/app/src/main/assets/build-info.txt
          echo "Author: ovrrpo"             >> android/app/src/main/assets/build-info.txt
          echo "Build:  ${{ github.run_number }}" >> android/app/src/main/assets/build-info.txt
          echo "Commit: ${{ github.sha }}"  >> android/app/src/main/assets/build-info.txt
          echo "Date:   $(date -u)"         >> android/app/src/main/assets/build-info.txt

      # ════════════════════════════════════════════════════════════════════════
      # 10. BUILD DEBUG APK
      # ════════════════════════════════════════════════════════════════════════
      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ════════════════════════════════════════════════════════════════════════
      # 11. BUILD SIGNED RELEASE APK
      #     ─────────────────────────────────────────────────────────────────
      #     HOW TO ENABLE:
      #       1. Generate a keystore on your machine:
      #            keytool -genkey -v -keystore h2tracker.jks \
      #              -alias h2tracker -keyalg RSA -keysize 2048 -validity 10000
      #       2. Base64-encode it:
      #            base64 -w 0 h2tracker.jks
      #       3. Add these four GitHub Secrets to your repo
      #          (Settings → Secrets → Actions → New repository secret):
      #            KEYSTORE_BASE64   ← the base64 string from step 2
      #            KEY_ALIAS         ← e.g.  h2tracker
      #            KEY_PASSWORD      ← password you chose for the key
      #            STORE_PASSWORD    ← password you chose for the keystore
      #       4. Remove the leading  '#'  from every line in this block.
      #     ─────────────────────────────────────────────────────────────────
      # - name: Decode keystore
      #   run: |
      #     echo "${{ secrets.KEYSTORE_BASE64 }}" \
      #       | base64 --decode > android/app/h2tracker.jks
      #
      # - name: Build signed release APK
      #   working-directory: android
      #   run: |
      #     chmod +x gradlew
      #     ./gradlew assembleRelease --no-daemon --stacktrace \
      #       -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/h2tracker.jks \
      #       -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
      #       -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
      #       -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      #   env:
      #     ANDROID_HOME: ${{ env.ANDROID_HOME }}
      #
      # - name: Upload signed release APK
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: H2-Tracker-release-${{ github.run_number }}
      #     path: android/app/build/outputs/apk/release/app-release.apk
      #     if-no-files-found: error
      #     retention-days: 90

      # ════════════════════════════════════════════════════════════════════════
      # 12. UPLOAD DEBUG APK
      # ════════════════════════════════════════════════════════════════════════
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: H2-Tracker-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ════════════════════════════════════════════════════════════════════════
      # 13. BUILD SUMMARY
      # ════════════════════════════════════════════════════════════════════════
      - name: Build summary
        run: |
          echo "## ✅ H2 Tracker APK built successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| App | H2 Tracker |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | com.h2tracker.localapp |" >> $GITHUB_STEP_SUMMARY
          echo "| Author | ovrrpo |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | 22 |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(stat -c%s android/app/build/outputs/apk/debug/app-debug.apk 2>/dev/null || echo "N/A")
          echo "| Debug APK size | ${APK_SIZE} bytes |" >> $GITHUB_STEP_SUMMARY
